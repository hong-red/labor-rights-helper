<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>角色选择 - 原告 / 被告</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(to bottom, #f0f4ff 0%, #e3e9ff 100%);
            min-height: 100vh;
            color: #1e3a8a;
            line-height: 1.6;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 28px 16px;
        }
        header {
            text-align: center;
            padding: 40px 0 24px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: #1e40af;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #1e40af;
            font-weight: 600;
        }
        main {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 28px 0 40px;
        }
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 26px 22px;
            font-size: 1.4rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.2);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .button:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(30, 64, 175, 0.3); }
        .button:active { transform: translateY(0); }
        .button i { font-size: 1.9rem; }
        .plaintiff { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .defendant { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
        .back {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #1e40af;
            font-weight: 600;
            text-decoration: none;
        }
    </style>
    </head>
<body>
    <div class="container">
        <header>
            <h1>选择你的角色</h1>
            <div class="subtitle">请选择后进入相应流程页面</div>
        </header>
        <main>
            <a href="index.html" class="button plaintiff">
                <i class="fas fa-hand-fist"></i>
                我是原告（维权方）
            </a>
            <a href="lawyer.html" class="button defendant">
                <i class="fas fa-shield-halved"></i>
                我是被告（应诉方）
            </a>
        </main>
        <a href="index.html" class="back">返回首页</a>
    </div>
</body>
</html>
